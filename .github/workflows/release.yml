name: CD Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare Chrome Extension
        run: |
          cp public/manifest.chrome.json dist/manifest.json
          cd dist
          zip -r ../spellingmon-chrome-extension.zip .

      - name: Handle Beta Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing beta tag and release if they exist
          gh release delete beta --yes || true
          git push --delete origin beta || true || echo "Tag not found on remote"

          # Create new beta tag and release
          git tag -f beta
          git push origin beta
          gh release create beta spellingmon-chrome-extension.zip --title "Latest Beta" --notes "Latest automated beta build from main branch." --prerelease

      - name: Handle Tag Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: spellingmon-chrome-extension.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Placeholder for Chrome Web Store upload
      # To enable, you must set up the following secrets:
      # CHROME_EXTENSION_ID, CHROME_CLIENT_ID, CHROME_CLIENT_SECRET, CHROME_REFRESH_TOKEN
      # Only runs on official tagged releases
      - name: Upload to Chrome Web Store
        if: startsWith(github.ref, 'refs/tags/v') && secrets.CHROME_EXTENSION_ID != ''
        uses: chrome-plugin-labs/chrome-extension-upload@v1
        with:
          file-path: spellingmon-chrome-extension.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
